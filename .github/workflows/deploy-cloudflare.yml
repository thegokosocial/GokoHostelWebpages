# Deploys the OpenNext bundle to Cloudflare Workers on every push to `main`.
# Add repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# (Workers → Overview → account id in the right sidebar; API token with Workers Scripts:Edit).
#
# If you use Cloudflare “Workers Builds” (Git connected in the dashboard), disable this
# workflow or leave secrets unset so you only deploy from one place.

name: Deploy Cloudflare

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
